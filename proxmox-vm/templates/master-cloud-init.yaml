#cloud-config
package_update: true
ssh_pwauth: true
hostname: lxa-${cluster_name}-master

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - ${ssh_public_key}

chpasswd:
  list: |
    ubuntu:${ssh_password}
  expire: false

packages:
  - qemu-guest-agent
  - curl
  - jq
  - net-tools
  - iputils-ping
  - nfs-common
  - yq
  - python3-pip

write_files:
  - path: /usr/local/bin/k8s-node-label.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e

      NODE_NAME="$1"

      LABEL_KEY='node-role.kubernetes.io/worker'
      LABEL_VALUE=''
      MAX_ATTEMPTS=60
      RETRY_DELAY=5

      SUCCESS=0

      for i in $(seq 1 $MAX_ATTEMPTS); do
        if kubectl label node "$${NODE_NAME}" "$LABEL_KEY=$LABEL_VALUE" --overwrite >/dev/null 2>&1; then
          SUCCESS=1
          break
        fi
        sleep $RETRY_DELAY
      done

      if [ "$SUCCESS" -eq 1 ]; then
        echo "✅ Node $${NODE_NAME} labeled successfully"
      else
        echo "❌ Failed to label node $${NODE_NAME} after $${MAX_ATTEMPTS} attempts"
        exit 1
      fi

  - path: /usr/local/bin/k8s-worker-cleanup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e

      NODE_NAME="$1"

      if [ -z "$NODE_NAME" ]; then
        echo "❌ Node name not provided"
        exit 1
      fi

      echo "Cleaning up node: $NODE_NAME"

      # Drain (ignore errors)
      kubectl drain "$NODE_NAME" \
        --ignore-daemonsets \
        --delete-emptydir-data \
        >/dev/null 2>&1 || true

      # Delete node (ignore if already gone)
      kubectl delete node "$NODE_NAME" \
        >/dev/null 2>&1 || true

      echo "✅ Cleanup completed for $NODE_NAME"

  - path: /usr/local/bin/k3s-shared-storage-setup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      mkdir -p /lxa_k8s
      echo "192.168.1.4:/volume1/infra-storage/lxa_k8s /lxa_k8s nfs defaults,_netdev 0 0" >> /etc/fstab
      mount -a

  - path: /usr/local/bin/k3s-master-setup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e

      echo "=== Fetching master ip ==="
      MASTER_IP=${master_address != "" ? master_address : "$(hostname -I | awk '{print $1}')"}

      echo "=== Setting up k3s config ==="
      mkdir -p /etc/rancher/k3s
      cat <<EOF > /etc/rancher/k3s/config.yaml
      node-name: $(hostname)
      EOF

      echo "=== Installing K3s master ==="
      curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="${k3s_version}" \
      sh -s - server \
      --token="${k3s_token}" \
      --tls-san $${MASTER_IP} \
      ${install_flags} ${other_flags}

      echo "=== Preparing Join Command ==="
      TOKEN="${k3s_token}"
      config_store_path="/lxa_k8s/${cluster_name}"
      mkdir -p $${config_store_path}

      JOIN_CMD="curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=${k3s_version} sh -s - agent --token=$${TOKEN} --server https://$${MASTER_IP}:6443 ${other_flags}"

      echo "$JOIN_CMD" > $${config_store_path}/join-${cluster_id}.sh
      chmod +x $${config_store_path}/join-${cluster_id}.sh

      echo "$JOIN_CMD"

      echo "=== Setting up Context ==="

      python3 - <<'EOF'
      import subprocess, sys
      try:
          import yaml
      except ImportError:
          subprocess.check_call([sys.executable, "-m", "pip", "install", "pyyaml"])
      EOF

      python3 - "$${MASTER_IP}" "${cluster_name}" <<EOF
      import sys, yaml

      master_ip = sys.argv[1]
      cluster_name = sys.argv[2]

      path = "/etc/rancher/k3s/k3s.yaml"

      with open(path, "r") as f:
          data = yaml.safe_load(f)

      data["clusters"][0]["name"] = f"lxa-{cluster_name}"
      data["clusters"][0]["cluster"]["server"] = f"https://{master_ip}:6443"
      data["contexts"][0]["name"] = "lxa"
      data["contexts"][0]["context"]["cluster"] = f"lxa-{cluster_name}"
      data["contexts"][0]["context"]["user"] = f"lxa-{cluster_name}-admin"
      data["current-context"] = "lxa"
      data["users"][0]["name"] = f"lxa-{cluster_name}-admin"

      with open(path, "w") as f:
          yaml.safe_dump(data, f, default_flow_style=False)
      EOF

      echo "=== Setting up Kube config ==="
      k3s kubectl config view --raw > $${config_store_path}/kubeconfig-${cluster_id}
      mkdir -p /root/.kube
      k3s kubectl config view --raw > /root/.kube/config

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - /usr/local/bin/k3s-shared-storage-setup.sh
  - /usr/local/bin/k3s-master-setup.sh
