#cloud-config
package_update: true
ssh_pwauth: true

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: ${ssh_password_hash}
    ssh_authorized_keys:
      - ${ssh_public_key}

chpasswd:
  expire: false

packages:
  - qemu-guest-agent

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
